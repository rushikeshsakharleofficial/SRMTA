# SRMTA MX-Based IP Routing
# config.d/70-routing.yaml
#
# Maps email providers to dedicated sending IPs. Each provider sees mail
# from a consistent IP set, isolating reputation. If primary IPs go
# unhealthy, backup IPs are used. Unmatched providers use fallback IPs.

routing:
  # ── Sender Domain → IP Binding ───────────────────────────────────────
  # Bind specific sender (FROM) domains to dedicated IPs or subnets.
  # Sender routes take priority over MX-based routing below.
  # Supports exact domains, wildcard subdomains, IPs, and CIDR subnets.
  sender_routes:
    # Example: all mail FROM example.com uses these specific IPs
    # - domain: "example.com"
    #   ips:
    #     - "203.0.113.30"
    #     - "203.0.113.31"
    #   backup_ips:
    #     - "203.0.113.50"

    # Example: all mail FROM any subdomain of corp.com uses IPs in this subnet
    # - domain: "*.corp.com"
    #   subnets:
    #     - "10.0.1.0/24"
    #   backup_ips:
    #     - "203.0.113.50"

    # Example: transactional mail FROM notify.example.com gets dedicated IP
    # - domain: "notify.example.com"
    #   ips:
    #     - "203.0.113.40"

  # Global fallback IPs — used when no provider matches or all primaries/backups are down
  fallback_ips:
    - "203.0.113.50"
    - "203.0.113.51"

  routes:
    # ── Google / Gmail ───────────────────────────────────────────────
    # Dedicated IPs with known-good Gmail reputation
    - name: "google"
      mx_patterns:
        - "*.google.com"
        - "*.googlemail.com"
        - "gmail-smtp-in.l.google.com"
      domain_patterns:
        - "gmail.com"
        - "googlemail.com"
      primary_ips:
        - "203.0.113.10"
        - "203.0.113.11"
      backup_ips:
        - "203.0.113.20"

    # ── Microsoft / Outlook ──────────────────────────────────────────
    # Separate IPs — Outlook is strict and will block shared-IP senders
    - name: "microsoft"
      mx_patterns:
        - "*.mail.protection.outlook.com"
        - "*.olc.protection.outlook.com"
      domain_patterns:
        - "outlook.com"
        - "hotmail.com"
        - "live.com"
        - "msn.com"
      primary_ips:
        - "203.0.113.12"
        - "203.0.113.13"
      backup_ips:
        - "203.0.113.21"

    # ── Yahoo / AOL ──────────────────────────────────────────────────
    - name: "yahoo"
      mx_patterns:
        - "*.yahoodns.net"
        - "*.yahoo.com"
      domain_patterns:
        - "yahoo.com"
        - "aol.com"
        - "verizon.net"
      primary_ips:
        - "203.0.113.14"
      backup_ips:
        - "203.0.113.22"

    # ── Apple / iCloud ───────────────────────────────────────────────
    - name: "apple"
      mx_patterns:
        - "*.mail.icloud.com"
        - "*.apple.com"
      domain_patterns:
        - "icloud.com"
        - "me.com"
        - "mac.com"
      primary_ips:
        - "203.0.113.15"
      backup_ips:
        - "203.0.113.23"

    # ── Zoho Mail ────────────────────────────────────────────────────
    - name: "zoho"
      mx_patterns:
        - "*.zoho.com"
        - "*.zohomail.com"
      domain_patterns:
        - "zoho.com"
        - "zohomail.com"
        - "zohomail.in"
        - "zohomail.eu"
      primary_ips:
        - "203.0.113.19"
      backup_ips:
        - "203.0.113.24"

    # ── All Others ───────────────────────────────────────────────────
    # Corporate MX, ISPs, IMAP providers, smaller mail servers.
    # If a provider has a dedicated IMAP setup (e.g. self-hosted),
    # it still needs outbound SMTP delivery — this pool handles those.
    - name: "other"
      mx_patterns:
        - "*"           # Catch-all (matched last since routes are ordered)
      primary_ips:
        - "203.0.113.16"
        - "203.0.113.17"
        - "203.0.113.18"
      backup_ips:
        - "203.0.113.50"
        - "203.0.113.51"
