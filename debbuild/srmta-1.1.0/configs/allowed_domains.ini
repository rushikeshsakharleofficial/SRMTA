# SRMTA Allowed Domains
# One domain per line. Lines starting with # or ; are comments.
# Wildcard: .example.com matches all subdomains of example.com
#
# These are the domains SRMTA is authorized to send mail for.
# Incoming mail from other domains will be rejected (open relay prevention).

[domains]
example.com
mail.example.com
transactional.example.com
.example.com           ; wildcard — all subdomains
