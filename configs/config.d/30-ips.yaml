# SRMTA Sub-Config: IP Pool & Health Scoring
# File: config.d/30-ips.yaml
# Manage sending IPs, warm-up schedules, and health thresholds

ip_pool:
  ips:
    - address: "203.0.113.10"
      version: 4
      weight: 100
      warm_up: false
      max_rate: 0          # No rate limit (fully warmed)
      disabled: false

    - address: "203.0.113.11"
      version: 4
      weight: 100
      warm_up: true
      max_rate: 500        # 500 emails/hour during warm-up
      disabled: false

    - address: "203.0.113.12"
      version: 4
      weight: 80
      warm_up: false
      max_rate: 0
      disabled: false

    - address: "2001:db8::1"
      version: 6
      weight: 50
      warm_up: false
      max_rate: 0
      disabled: false

  health_window: "1h"
  disable_threshold: 0.3    # Disable IP if error rate > 30%
  recovery_time: "30m"      # Re-enable after 30 minutes
